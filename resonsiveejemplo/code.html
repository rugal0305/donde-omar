<script data-purpose="app-logic">
    // Data passed from Input Variables / Context
    const CONFIG = {
      businessName: "OH DONDE OMAR PARRILLA",
      whatsappPhone: "573105556677"
    };

    const MENU_ITEMS = [
      { id: "perro-sencillo", icon: "🌭", name: "Perro Sencillo", description: "Salchicha, cebolla, lechuga, queso costeño, papa ripio y mozzarella.", price: 5000, category: "Perros Calientes" },
      { id: "perro-apanado", icon: "🌭", name: "Perro Apanado", description: "Salchicha, cebolla, jamón, ripio, lechuga, mozzarella y queso costeño.", price: 6000, category: "Perros Calientes" },
      { id: "salvajada-sencilla", icon: "🍽️", name: "Salvajada Sencilla", description: "lechuga, francesa, pollo en trozos, chorizo, butifarra, cebolla, queso costeño y ripio.", price: 20000, category: "Salvajadas" },
      { id: "hamb-sencilla", icon: "🍔", name: "Hamburguesa Sencilla", description: "carne de hamburguesa, lechuga, cebolla, tomate y queso mozzarella.", price: 7000, category: "Hamburguesas" },
      { id: "salchipapa-sencilla", icon: "🍟", name: "Salchipapa Sencilla", description: "salchicha manguera, lechuga, francesa y queso costeño.", price: 10000, category: "Salchipapas" },
      { id: "desgranado-pollo", icon: "🌽", name: "Desgranado con Pollo", description: "lechuga, francesa, pollo en trozos, maíz, papa ripio y queso mozzarella.", price: 14000, category: "Desgranados" },
      { id: "arepa-queso", icon: "🫓", name: "Arepa de Queso", description: "Deliciosa arepa asada rellena de queso mozzarella derretido.", price: 4000, category: "Arepas" },
      { id: "picada-personal", icon: "🍲", name: "Picada Personal", description: "cerdo, carne, chorizo, cebolla, pimentón, lechuga y patacón.", price: 20000, category: "Picadas" },
      { id: "asado-cerdo", icon: "🥩", name: "Cerdo Asado", description: "Lomo de cerdo, papa, yuca y ensalada.", price: 15000, category: "Asados al Carbón" },
      { id: "pizza-pers-jq", icon: "🍕", name: "Jamón y Queso (Personal)", description: "pasta de tomate, jamón y queso.", price: 12000, category: "Pizzas" }
      // ... more items truncated for logic brevity, but structure follows
    ];

    let cart = [];

    // Initialize App
    function init() {
      renderCategories();
      renderMenu();
      setupSearch();
    }

    function renderCategories() {
      const categories = [...new Set(MENU_ITEMS.map(item => item.category))];
      const container = document.getElementById('category-chips');
      
      let html = `<button onclick="filterMenu('Todos')" class="category-chip whitespace-nowrap px-4 py-1.5 rounded-full border border-white/10 text-sm font-medium transition-all category-active" data-cat="Todos">Todos</button>`;
      
      categories.forEach(cat => {
        html += `<button onclick="filterMenu('${cat}')" class="category-chip whitespace-nowrap px-4 py-1.5 rounded-full border border-white/10 text-sm font-medium transition-all" data-cat="${cat}">${cat}</button>`;
      });
      
      container.innerHTML = html;
    }

    function renderMenu(filter = 'Todos', search = '') {
      const container = document.getElementById('menu-container');
      const categories = [...new Set(MENU_ITEMS.map(item => item.category))];
      
      let html = '';
      
      categories.forEach(cat => {
        if (filter !== 'Todos' && filter !== cat) return;
        
        const items = MENU_ITEMS.filter(item => {
          const inCat = item.category === cat;
          const inSearch = item.name.toLowerCase().includes(search.toLowerCase());
          return inCat && inSearch;
        });

        if (items.length > 0) {
          html += `
            <div class="mt-8 mb-4">
              <h2 class="text-xl font-bold text-brand-gold flex items-center gap-2">
                <span class="w-1.5 h-6 bg-brand-red rounded-full"></span>
                ${cat}
              </h2>
            </div>
            <div class="space-y-4">
              ${items.map(item => `
                <div class="bg-brand-card border border-white/5 rounded-2xl p-4 flex gap-4 items-start shadow-sm shadow-black">
                  <div class="text-3xl bg-brand-dark w-12 h-12 flex items-center justify-center rounded-xl flex-shrink-0">
                    ${item.icon}
                  </div>
                  <div class="flex-1">
                    <h3 class="font-bold text-white text-base">${item.name}</h3>
                    <p class="text-xs text-gray-400 mt-1 line-clamp-2">${item.description}</p>
                    <div class="mt-4 flex items-center justify-between">
                      <span class="text-brand-gold font-bold text-lg">$${item.price.toLocaleString()}</span>
                      <button onclick="addToCart('${item.id}')" class="bg-brand-red text-white text-xs font-bold px-4 py-2 rounded-lg active:scale-95 transition-all flex items-center gap-1">
                        AÑADIR +
                      </button>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          `;
        }
      });
      
      container.innerHTML = html || `<div class="text-center py-20 text-gray-500">No se encontraron productos</div>`;
    }

    function filterMenu(cat) {
      document.querySelectorAll('.category-chip').forEach(btn => {
        btn.classList.remove('category-active');
        if (btn.getAttribute('data-cat') === cat) btn.classList.add('category-active');
      });
      renderMenu(cat, document.getElementById('product-search').value);
    }

    function setupSearch() {
      const searchInput = document.getElementById('product-search');
      searchInput.addEventListener('input', (e) => {
        const activeCat = document.querySelector('.category-active').getAttribute('data-cat');
        renderMenu(activeCat, e.target.value);
      });
    }

    // Cart Logic
    function addToCart(id) {
      const item = MENU_ITEMS.find(i => i.id === id);
      const existing = cart.find(i => i.id === id);
      
      if (existing) {
        existing.qty++;
      } else {
        cart.push({ ...item, qty: 1 });
      }
      
      updateCartUI();
      // Visual feedback
      const badge = document.getElementById('cart-count-badge');
      badge.classList.add('scale-125');
      setTimeout(() => badge.classList.remove('scale-125'), 200);
    }

    function removeFromCart(id) {
      cart = cart.filter(i => i.id !== id);
      updateCartUI();
    }

    function updateQty(id, delta) {
      const item = cart.find(i => i.id === id);
      if (item) {
        item.qty += delta;
        if (item.qty <= 0) {
          removeFromCart(id);
        } else {
          updateCartUI();
        }
      }
    }

    function updateCartUI() {
      const list = document.getElementById('cart-items-list');
      const empty = document.getElementById('cart-empty-state');
      const badge = document.getElementById('cart-count-badge');
      const totalLabel = document.getElementById('cart-total-price');
      
      const totalItems = cart.reduce((acc, i) => acc + i.qty, 0);
      const totalPrice = cart.reduce((acc, i) => acc + (i.price * i.qty), 0);
      
      badge.innerText = totalItems;
      totalLabel.innerText = `$${totalPrice.toLocaleString()}`;

      if (cart.length === 0) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
      } else {
        empty.classList.add('hidden');
        list.innerHTML = cart.map(item => `
          <div class="flex items-center gap-3 bg-brand-dark p-3 rounded-xl">
            <span class="text-2xl">${item.icon}</span>
            <div class="flex-1">
              <h4 class="text-sm font-bold truncate">${item.name}</h4>
              <p class="text-xs text-brand-gold">$${(item.price * item.qty).toLocaleString()}</p>
            </div>
            <div class="flex items-center bg-brand-card rounded-lg border border-white/10">
              <button onclick="updateQty('${item.id}', -1)" class="p-1 px-2 text-brand-gold">-</button>
              <span class="text-sm font-bold w-6 text-center">${item.qty}</span>
              <button onclick="updateQty('${item.id}', 1)" class="p-1 px-2 text-brand-gold">+</button>
            </div>
          </div>
        `).join('');
      }
    }

    function toggleCart() {
      const drawer = document.getElementById('cart-drawer');
      const overlay = document.getElementById('cart-overlay');
      const isOpen = !drawer.classList.contains('translate-y-full');

      if (isOpen) {
        drawer.classList.add('translate-y-full');
        overlay.classList.add('hidden');
      } else {
        drawer.classList.remove('translate-y-full');
        overlay.classList.remove('hidden');
      }
    }

    function sendOrder() {
      if (cart.length === 0) return alert('Tu carrito está vacío');
      
      const name = document.getElementById('order-name').value;
      const address = document.getElementById('order-address').value;
      const notes = document.getElementById('order-notes').value;
      
      if (!name || !address) return alert('Por favor ingresa tu nombre y dirección');

      let message = `*NUEVO PEDIDO - OH DONDE OMAR*\n\n`;
      message += `👤 *Cliente:* ${name}\n`;
      message += `📍 *Dirección:* ${address}\n`;
      if(notes) message += `📝 *Notas:* ${notes}\n`;
      message += `\n--------------------------\n`;
      
      cart.forEach(item => {
        message += `✅ ${item.qty}x ${item.name} - $${(item.price * item.qty).toLocaleString()}\n`;
      });
      
      const total = cart.reduce((acc, i) => acc + (i.price * i.qty), 0);
      message += `\n--------------------------\n`;
      message += `💰 *TOTAL A PAGAR: $${total.toLocaleString()}*`;

      const encoded = encodeURIComponent(message);
      window.open(`https://wa.me/${CONFIG.whatsappPhone}?text=${encoded}`, '_blank');
    }

    // Start everything
    init();
  </script>
<!-- END: DataAndLogic -->
</body></html>
